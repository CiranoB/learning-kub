name: Validate Branch Name

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]

jobs:
  validate:
    name: Check branch prefix
    runs-on: ubuntu-latest

    steps:
      - name: Validate branch name against conventional commit prefixes
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            console.log(`Branch name: ${branch}`);

            const allowedPattern = /^(feat|fix|chore|bump)(\/|-|_).+/;

            if (allowedPattern.test(branch)) {
              console.log(`Branch '${branch}' is valid.`);
            } else {
              core.setFailed(`Branch name '${branch}' does not follow the required naming convention.\nBranch names must start with one of: feat/, fix/, chore/, bump/\nExamples: feat/my-feature  fix/login-bug  chore/update-deps  bump/v2`);
            }
