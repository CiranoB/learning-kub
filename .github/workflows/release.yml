name: Release on Merge

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  release:
    name: Determine and Create Release
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Determine release type, calculate version, and create release
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            console.log(`Merged branch: ${branch}`);

            // Determine release type from branch name
            let type, label;
            if (/^feat(\/|-|_)/.test(branch) || branch === 'feat') {
              type = 'minor'; label = 'feat';
              console.log('  -> minor release (new feature)');
            } else if (/^fix(\/|-|_)/.test(branch) || branch === 'fix') {
              type = 'patch'; label = 'fix';
              console.log('  -> patch release (bug fix)');
            } else if (/^chore(\/|-|_)/.test(branch) || branch === 'chore') {
              type = 'patch'; label = 'chore';
              console.log('  -> patch release (chore / maintenance)');
            } else if (/^bump(\/|-|_)/.test(branch) || branch === 'bump') {
              type = 'patch'; label = 'bump';
              console.log('  -> patch release (version bump)');
            } else {
              console.log('  -> branch prefix is not feat/fix/chore/bump, skipping release');
              return;
            }

            // Get latest semver tag via GitHub API
            const tags = await github.paginate(github.rest.repos.listTags, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const semverTags = tags
              .map(t => t.name)
              .filter(t => /^v?\d+\.\d+\.\d+$/.test(t))
              .sort((a, b) => {
                const parse = v => v.replace(/^v/, '').split('.').map(Number);
                const [aMaj, aMin, aPat] = parse(a);
                const [bMaj, bMin, bPat] = parse(b);
                return bMaj - aMaj || bMin - aMin || bPat - aPat;
              });
            const latestTag = semverTags[0] || 'v0.0.0';
            console.log(`Latest tag: ${latestTag}`);

            // Calculate next version
            let [major, minor, patch] = latestTag.replace(/^v/, '').split('.').map(Number);
            if (type === 'major') { major++; minor = 0; patch = 0; }
            else if (type === 'minor') { minor++; patch = 0; }
            else if (type === 'patch') { patch++; }
            const newVersion = `v${major}.${minor}.${patch}`;
            console.log(`Next version: ${newVersion}`);

            // Create GitHub Release
            const pr = context.payload.pull_request;
            const notes = [
              '## What\'s Changed',
              '',
              `- **Branch:** \`${branch}\``,
              `- **Type:** \`${label}\` → ${type} version bump`,
              `- **PR:** [#${pr.number}](https://github.com/${context.repo.owner}/${context.repo.repo}/pull/${pr.number}) ${pr.title}`,
              '',
              `**Full Changelog:** https://github.com/${context.repo.owner}/${context.repo.repo}/compare/${latestTag}...${newVersion}`,
            ].join('\n');

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: newVersion,
              name: `Release ${newVersion}`,
              body: notes,
              target_commitish: 'main',
            });
            console.log(`Release ${newVersion} created successfully.`);
